name: Publish Packages

on:
  workflow_dispatch:
    inputs:
      package:
        description: "Public package set to publish"
        required: true
        default: "all-public"
        type: choice
        options:
          - all-public
          - runtime-topology
          - env
          - sdk
          - harness
          - devtools-core
          - mcp-server
          - server
          - create-airjam
      channel:
        description: "npm dist-tag to publish under"
        required: true
        default: "latest"
        type: choice
        options:
          - latest
          - next
  push:
    tags:
      - "release/public-v*"
      - "release/public-next-v*"

concurrency:
  group: publish-packages
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.resolve.outputs.packages }}
      channel: ${{ steps.resolve.outputs.channel }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve Publish Inputs
        id: resolve
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_PACKAGE: ${{ github.event.inputs.package }}
          INPUT_CHANNEL: ${{ github.event.inputs.channel }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          UNIFIED_VERSION="$(node ./scripts/release/public-packages.mjs version)"

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            RELEASE_PACKAGE="${INPUT_PACKAGE}"
            RELEASE_CHANNEL="${INPUT_CHANNEL}"
          else
            RELEASE_PACKAGE="all-public"

            case "$REF_NAME" in
              release/public-next-v*)
                RELEASE_CHANNEL="next"
                TAG_VERSION="${REF_NAME#release/public-next-v}"
                ;;
              release/public-v*)
                RELEASE_CHANNEL="latest"
                TAG_VERSION="${REF_NAME#release/public-v}"
                ;;
              *)
                echo "Unsupported release tag: $REF_NAME"
                exit 1
                ;;
            esac

            if [ "$TAG_VERSION" != "$UNIFIED_VERSION" ]; then
              echo "Release tag version $TAG_VERSION does not match unified public package version $UNIFIED_VERSION"
              exit 1
            fi
          fi

          PACKAGES_JSON="$(node ./scripts/release/public-packages.mjs resolve "$RELEASE_PACKAGE")"
          echo "packages=$PACKAGES_JSON" >> "$GITHUB_OUTPUT"
          echo "channel=$RELEASE_CHANNEL" >> "$GITHUB_OUTPUT"

  validate-release:
    runs-on: ubuntu-latest
    needs: prepare
    permissions:
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.9.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Ensure npm CLI Supports Trusted Publishing
        run: |
          npm install -g npm@latest
          node --version
          npm --version

      - name: Install pnpm
        run: corepack enable && corepack prepare pnpm@9.9.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Validate Release
        run: pnpm check:release

  publish:
    runs-on: ubuntu-latest
    needs:
      - prepare
      - validate-release
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.9.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Ensure npm CLI Supports Trusted Publishing
        run: |
          npm install -g npm@latest
          node --version
          npm --version

      - name: Install pnpm
        run: corepack enable && corepack prepare pnpm@9.9.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Publish Selected Public Packages
        env:
          PACKAGES_JSON: ${{ needs.prepare.outputs.packages }}
          RELEASE_CHANNEL: ${{ needs.prepare.outputs.channel }}
          GH_TOKEN: ${{ github.token }}
        run: |
          printf '%s' "$PACKAGES_JSON" > /tmp/airjam-public-packages.json

          while IFS=$'\t' read -r ID PACKAGE_NAME PACKAGE_FILTER WORKING_DIRECTORY VERSION TAG RELEASE_NAME; do
            git rev-parse "$TAG" >/dev/null 2>&1 && {
              echo "Tag $TAG already exists"
              exit 1
            }

            if npm view "${PACKAGE_NAME}@${VERSION}" version >/dev/null 2>&1; then
              echo "${PACKAGE_NAME}@${VERSION} is already published on npm"
              exit 1
            fi

            pnpm --filter "${PACKAGE_FILTER}..." build

            (
              cd "${WORKING_DIRECTORY}"
              pnpm publish --access public --tag "${RELEASE_CHANNEL}" --provenance --no-git-checks
            )

            git tag "$TAG"
            git push origin "$TAG"

            gh release create "$TAG" \
              --title "$RELEASE_NAME" \
              --generate-notes
          done < <(node <<'EOF'
          const fs = require("node:fs");
          const packages = JSON.parse(fs.readFileSync("/tmp/airjam-public-packages.json", "utf8"));

          for (const pkg of packages) {
            const fields = [
              pkg.id,
              pkg.packageName,
              pkg.packageFilter,
              pkg.workingDirectory,
              pkg.version,
              pkg.tag,
              pkg.releaseName,
            ];
            process.stdout.write(fields.join("\t") + "\n");
          }
          EOF
          )
