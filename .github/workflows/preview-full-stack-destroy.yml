name: Preview Full Stack Destroy

on:
  pull_request_target:
    types: [closed]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Pull request number"
        required: true
        type: string
      preview_base_domain:
        description: "Optional base domain override (for example: preview.airjam.io)"
        required: false
        type: string

permissions:
  contents: read
  issues: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: preview-pr-${{ github.event.pull_request.number || github.event.inputs.pr_number || github.run_id }}
  cancel-in-progress: false

jobs:
  preview-down:
    name: Preview Down
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.pull_request.head.repo.full_name == format('{0}/{1}', github.repository_owner, github.event.repository.name)
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Resolve pull request metadata
        id: pr
        uses: actions/github-script@v8
        with:
          script: |
            const eventName = context.eventName;
            let prNumber;
            let branch = null;
            let sha = null;

            if (eventName === "pull_request_target") {
              const pr = context.payload.pull_request;
              prNumber = pr.number;
              branch = pr.head.ref;
              sha = pr.head.sha;
            } else {
              prNumber = Number.parseInt("${{ github.event.inputs.pr_number }}", 10);
              if (!Number.isInteger(prNumber) || prNumber <= 0) {
                core.setFailed(`Invalid PR number: ${{ github.event.inputs.pr_number }}`);
                return;
              }

              const { data: pr } = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
              });

              branch = pr.head.ref;
              sha = pr.head.sha;
            }

            core.setOutput("number", String(prNumber));
            core.setOutput("branch", branch ?? "");
            core.setOutput("sha", sha ?? "");

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"

      - name: Enable corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build preview CLI runtime prerequisites
        run: pnpm --filter sdk build

      - name: Install provider CLIs
        run: npm install -g vercel@52.0.0

      - name: Tear preview down
        env:
          PREVIEW_BASE_DOMAIN: ${{ inputs.preview_base_domain || vars.PREVIEW_BASE_DOMAIN }}
          PREVIEW_AIR_JAM_APP_ID: ${{ vars.PREVIEW_AIR_JAM_APP_ID }}
          RAILWAY_PROJECT_ID: ${{ vars.RAILWAY_PROJECT_ID }}
          PREVIEW_R2_BUCKET: ${{ vars.PREVIEW_R2_BUCKET }}
          PREVIEW_R2_ACCOUNT_ID: ${{ vars.PREVIEW_R2_ACCOUNT_ID }}
          PREVIEW_R2_ENDPOINT: ${{ vars.PREVIEW_R2_ENDPOINT }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          PREVIEW_AIR_JAM_MASTER_KEY: ${{ secrets.PREVIEW_AIR_JAM_MASTER_KEY }}
          PREVIEW_BETTER_AUTH_SECRET: ${{ secrets.PREVIEW_BETTER_AUTH_SECRET }}
          PREVIEW_RELEASES_INTERNAL_ACCESS_TOKEN: ${{ secrets.PREVIEW_RELEASES_INTERNAL_ACCESS_TOKEN }}
          PREVIEW_RELEASES_BROWSER_ACCESS_TOKEN: ${{ secrets.PREVIEW_RELEASES_BROWSER_ACCESS_TOKEN }}
          PREVIEW_DATABASE_URL_TEMPLATE: ${{ secrets.PREVIEW_DATABASE_URL_TEMPLATE }}
          PREVIEW_R2_ACCESS_KEY_ID: ${{ secrets.PREVIEW_R2_ACCESS_KEY_ID }}
          PREVIEW_R2_SECRET_ACCESS_KEY: ${{ secrets.PREVIEW_R2_SECRET_ACCESS_KEY }}
        run: |
          args=(
            preview
            down
            --pr "${{ steps.pr.outputs.number }}"
            --apply
            --json
          )

          if [ -n "${{ steps.pr.outputs.branch }}" ]; then
            args+=(--branch "${{ steps.pr.outputs.branch }}")
          fi

          if [ -n "${{ steps.pr.outputs.sha }}" ]; then
            args+=(--sha "${{ steps.pr.outputs.sha }}")
          fi

          if [ -n "$PREVIEW_BASE_DOMAIN" ]; then
            args+=(--preview-base-domain "$PREVIEW_BASE_DOMAIN")
          fi

          pnpm --silent run repo -- "${args[@]}" > preview-down.json

      - name: Upload preview teardown result
        uses: actions/upload-artifact@v6
        with:
          name: preview-down-pr-${{ steps.pr.outputs.number }}
          path: preview-down.json

      - name: Write summary
        run: |
          echo "## Full-stack preview teardown" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "PR #${{ steps.pr.outputs.number }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```json' >> "$GITHUB_STEP_SUMMARY"
          cat preview-down.json >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Update preview status comment on PR
        if: github.event_name == 'pull_request_target' || github.event_name == 'workflow_dispatch'
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require("node:fs");
            const raw = fs.readFileSync("preview-down.json", "utf8").trim();
            const startIndex = raw.search(/[\\[{]/);
            if (startIndex === -1) {
              throw new Error("preview-down.json did not contain JSON output");
            }

            const result = JSON.parse(raw.slice(startIndex));
            const marker = `<!-- airjam-preview:${result.previewId} -->`;
            const body = [
              marker,
              "## Full-stack preview destroyed",
              "",
              `- App alias: ${result.manifest.vercel.previewHost}`,
              `- Railway env: \`${result.manifest.railway.environmentName}\``,
              `- Preview schema: \`${result.manifest.database.schemaName}\``,
            ].join("\n");

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number.parseInt("${{ steps.pr.outputs.number }}", 10),
              per_page: 100,
            });

            const existing = comments.find((comment) => comment.body?.includes(marker));
            if (!existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: Number.parseInt("${{ steps.pr.outputs.number }}", 10),
                body,
              });
              return;
            }

            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: existing.id,
              body,
            });
