name: Preview Full Stack Sweep

on:
  schedule:
    - cron: "23 3 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: preview-sweep
  cancel-in-progress: false

jobs:
  preview-sweep:
    name: Preview Sweep
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Resolve open trusted PR numbers
        id: prs
        uses: actions/github-script@v8
        with:
          script: |
            const pulls = await github.paginate(github.rest.pulls.list, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              per_page: 100,
            });

            const trustedPrNumbers = pulls
              .filter((pr) => pr.head.repo.full_name === `${context.repo.owner}/${context.repo.repo}`)
              .map((pr) => pr.number)
              .sort((left, right) => left - right);

            core.setOutput("numbers", JSON.stringify(trustedPrNumbers));

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          package-manager-cache: false

      - name: Enable corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build preview CLI runtime prerequisites
        run: pnpm --filter sdk build

      - name: Install provider CLIs
        run: npm install -g vercel@52.0.0

      - name: Sweep orphaned previews
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          PREVIEW_BASE_DOMAIN: ${{ vars.PREVIEW_BASE_DOMAIN }}
          PREVIEW_AIR_JAM_APP_ID: ${{ vars.PREVIEW_AIR_JAM_APP_ID }}
          RAILWAY_PROJECT_ID: ${{ vars.RAILWAY_PROJECT_ID }}
          PREVIEW_R2_BUCKET: ${{ vars.PREVIEW_R2_BUCKET }}
          PREVIEW_R2_ACCOUNT_ID: ${{ vars.PREVIEW_R2_ACCOUNT_ID }}
          PREVIEW_R2_ENDPOINT: ${{ vars.PREVIEW_R2_ENDPOINT }}
          PREVIEW_AIR_JAM_MASTER_KEY: ${{ secrets.PREVIEW_AIR_JAM_MASTER_KEY }}
          PREVIEW_BETTER_AUTH_SECRET: ${{ secrets.PREVIEW_BETTER_AUTH_SECRET }}
          PREVIEW_RELEASES_INTERNAL_ACCESS_TOKEN: ${{ secrets.PREVIEW_RELEASES_INTERNAL_ACCESS_TOKEN }}
          PREVIEW_RELEASES_BROWSER_ACCESS_TOKEN: ${{ secrets.PREVIEW_RELEASES_BROWSER_ACCESS_TOKEN }}
          PREVIEW_DATABASE_URL_TEMPLATE: ${{ secrets.PREVIEW_DATABASE_URL_TEMPLATE }}
          PREVIEW_R2_ACCESS_KEY_ID: ${{ secrets.PREVIEW_R2_ACCESS_KEY_ID }}
          PREVIEW_R2_SECRET_ACCESS_KEY: ${{ secrets.PREVIEW_R2_SECRET_ACCESS_KEY }}
          OPEN_TRUSTED_PRS: ${{ steps.prs.outputs.numbers }}
        run: |
          pnpm run repo -- preview sweep --open-prs "$OPEN_TRUSTED_PRS" --apply --json > preview-sweep.json

      - name: Upload sweep result
        uses: actions/upload-artifact@v6
        with:
          name: preview-sweep-${{ github.run_id }}
          path: preview-sweep.json

      - name: Write summary
        run: |
          echo "## Preview sweep" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Open trusted PRs: ${{ steps.prs.outputs.numbers }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```json' >> "$GITHUB_STEP_SUMMARY"
          cat preview-sweep.json >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
