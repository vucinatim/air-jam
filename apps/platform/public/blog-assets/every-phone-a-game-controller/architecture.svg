<svg width="900" height="380" viewBox="0 0 900 380" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Air Jam architecture: a host screen displays a QR code, players' phones become controllers, inputs flow to the host, shared state syncs back." preserveAspectRatio="xMidYMid meet">
  <style>
    .heading { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; font-size: 14px; font-weight: 700; letter-spacing: 0.04em; }
    .label { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; font-size: 13px; font-weight: 600; }
    .label-sm { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; font-size: 11px; }
    .text-mute { fill: rgba(127, 127, 127, 0.85); }
  </style>

  <!-- Subtle translucent card background; reads on light AND dark surfaces -->
  <rect width="900" height="380" rx="14" fill="rgba(127, 127, 127, 0.08)"/>

  <!-- HOST -->
  <g transform="translate(80, 70)">
    <rect width="300" height="200" rx="10" fill="rgba(74, 222, 128, 0.06)" stroke="#4ade80" stroke-width="2"/>
    <text x="150" y="34" text-anchor="middle" class="heading" fill="#4ade80">HOST</text>
    <text x="150" y="52" text-anchor="middle" class="label-sm text-mute">TV / Laptop · runs the game</text>

    <!-- QR -->
    <rect x="110" y="74" width="80" height="80" fill="#fff" rx="4"/>
    <g fill="#000">
      <rect x="118" y="82" width="20" height="20"/>
      <rect x="162" y="82" width="20" height="20"/>
      <rect x="118" y="126" width="20" height="20"/>
      <rect x="142" y="98" width="8" height="8"/>
      <rect x="150" y="110" width="8" height="8"/>
      <rect x="138" y="118" width="8" height="8"/>
      <rect x="150" y="130" width="8" height="8"/>
      <rect x="142" y="142" width="8" height="8"/>
      <rect x="160" y="138" width="8" height="8"/>
      <rect x="126" y="110" width="6" height="6"/>
      <rect x="170" y="118" width="6" height="6"/>
    </g>
    <text x="150" y="180" text-anchor="middle" class="label-sm text-mute">scan to join</text>
  </g>
  <!-- laptop stand -->
  <rect x="180" y="278" width="100" height="6" rx="2" fill="rgba(74, 222, 128, 0.06)" stroke="#4ade80" stroke-width="2"/>

  <!-- PHONES -->
  <g transform="translate(560, 60)">
    <g>
      <rect width="60" height="100" rx="8" fill="rgba(96, 165, 250, 0.06)" stroke="#60a5fa" stroke-width="2"/>
      <rect x="6" y="14" width="48" height="72" rx="2" fill="rgba(96, 165, 250, 0.12)"/>
      <circle cx="30" cy="92" r="2.5" fill="#60a5fa" opacity="0.7"/>
    </g>
    <g transform="translate(80, 0)">
      <rect width="60" height="100" rx="8" fill="rgba(96, 165, 250, 0.06)" stroke="#60a5fa" stroke-width="2"/>
      <rect x="6" y="14" width="48" height="72" rx="2" fill="rgba(96, 165, 250, 0.12)"/>
      <circle cx="30" cy="92" r="2.5" fill="#60a5fa" opacity="0.7"/>
    </g>
    <g transform="translate(160, 0)">
      <rect width="60" height="100" rx="8" fill="rgba(96, 165, 250, 0.06)" stroke="#60a5fa" stroke-width="2"/>
      <rect x="6" y="14" width="48" height="72" rx="2" fill="rgba(96, 165, 250, 0.12)"/>
      <circle cx="30" cy="92" r="2.5" fill="#60a5fa" opacity="0.7"/>
    </g>
    <g transform="translate(40, 130)">
      <rect width="60" height="100" rx="8" fill="rgba(96, 165, 250, 0.06)" stroke="#60a5fa" stroke-width="2"/>
      <rect x="6" y="14" width="48" height="72" rx="2" fill="rgba(96, 165, 250, 0.12)"/>
      <circle cx="30" cy="92" r="2.5" fill="#60a5fa" opacity="0.7"/>
    </g>
    <g transform="translate(120, 130)">
      <rect width="60" height="100" rx="8" fill="rgba(96, 165, 250, 0.06)" stroke="#60a5fa" stroke-width="2"/>
      <rect x="6" y="14" width="48" height="72" rx="2" fill="rgba(96, 165, 250, 0.12)"/>
      <circle cx="30" cy="92" r="2.5" fill="#60a5fa" opacity="0.7"/>
    </g>
    <text x="110" y="262" text-anchor="middle" class="heading" fill="#60a5fa">CONTROLLERS</text>
    <text x="110" y="280" text-anchor="middle" class="label-sm text-mute">players' phones</text>
  </g>

  <!-- Arrow: inputs (phones to host) -->
  <g>
    <path d="M 550 145 L 400 145" stroke="#60a5fa" stroke-width="2" fill="none" stroke-dasharray="6 4"/>
    <polygon points="400,145 412,140 412,150" fill="#60a5fa"/>
    <text x="475" y="135" text-anchor="middle" class="label" fill="#60a5fa">inputs</text>
    <text x="475" y="162" text-anchor="middle" class="label-sm text-mute">Zod-validated, frame-latched</text>
  </g>

  <!-- Arrow: state (host to phones) -->
  <g>
    <path d="M 400 220 L 550 220" stroke="#4ade80" stroke-width="2" fill="none" stroke-dasharray="6 4"/>
    <polygon points="550,220 538,215 538,225" fill="#4ade80"/>
    <text x="475" y="210" text-anchor="middle" class="label" fill="#4ade80">shared state</text>
    <text x="475" y="237" text-anchor="middle" class="label-sm text-mute">host-authoritative Zustand</text>
  </g>

  <!-- Caption -->
  <text x="450" y="342" text-anchor="middle" class="label-sm text-mute">No app install. No pairing. Scan the QR, you're a controller.</text>
</svg>
